name: Maven CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  maven-test:
    name: Maven tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 26
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "26"
          cache: maven

      - name: Run tests
        run: ./mvnw test